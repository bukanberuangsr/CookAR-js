<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CookAR Prototype</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>
</head>

<body style="margin: 0px; overflow: hidden">
    <a-scene embedded arjs="sourceType: webcam;">
        <a-marker preset="hiro">
            <a-entity id="foodModel" gltf-model="./assets/models/croissant.glb" position="0 0.08 0" rotation="0 180 0"
                scale="4 4 4">
            </a-entity>

            <a-plane position="0 0.0 0" rotation="-90 0 0" width="2.8" height="4" color="#000" opacity="0.9"
                material="side: double">
            </a-plane>

            <a-text id="hiroFoodInfo" position="-1.25 0.12 -1.52" rotation="-90 0 0" width="2.5" color="#ffeb3b"
                align="left" baseline="top" side="double" wrap-count="28">
            </a-text>
        </a-marker>

        <a-marker preset="kanji">
            <a-entity gltf-model="./assets/models/pizza.glb" position="0 0.0 0" rotation="0 180 0" scale="2 2 2">
            </a-entity>

            <a-plane position="0 0.0 0" rotation="-90 0 0" width="2.8" height="4" color="#000" opacity="0.9"
                material="side: double">
            </a-plane>

            <a-text id="kanjiFoodInfo" position="-1.25 0.12 -1.52" rotation="-90 0 0" width="2.5" color="#ffeb3b"
                align="left" baseline="top" side="double" wrap-count="28">
            </a-text>
        </a-marker>

        <a-marker type="pattern" url="./assets/pattern-brick.patt">
            <a-entity gltf-model="./assets/models/mangkuk_bakso_mie_ayam.glb" position="0 0.08 0" rotation="0 180 0"
                scale="4 4 4">
            </a-entity>

            <a-plane position="0 0.0 0" rotation="-90 0 0" width="2.8" height="4" color="#000" opacity="0.9"
                material="side: double">
            </a-plane>

            <a-text id="brickFoodInfo" position="-1.25 0.12 -1.52" rotation="-90 0 0" width="2.5" color="#ffeb3b"
                align="left" baseline="top" side="double" wrap-count="28">
            </a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
    <script src="./scripts/foods.js"></script>
    <script>
        const food = foods.croissant;
        const foodModel = document.querySelector("#foodModel");

        foodModel.addEventListener("model-loaded", () => {
            console.log("Model loaded:", food.model);
        });

        foodModel.addEventListener("model-error", (event) => {
            console.error("Model failed to load:", food.model, event.detail);
        });

        document.querySelector("#hiroFoodInfo")
            .setAttribute(
                "value",
                food.name +
                "\n\nBahan:\n- " +
                food.ingredients.join("\n- ") +
                "\n\nNutrisi:\n- " +
                food.nutrition.join("\n- ") +
                "\n\nAlergen:\n- " +
                food.allergens.join("\n- ") +
                "\n\nProses: " +
                food.cookingProcess
            );

        document.querySelector("#kanjiFoodInfo")
            .setAttribute(
                "value",
                foods.pizza.name +
                "\n\nBahan:\n- " +
                foods.pizza.ingredients.join("\n- ") +
                "\n\nNutrisi:\n- " +
                foods.pizza.nutrition.join("\n- ") +
                "\n\nAlergen:\n- " +
                foods.pizza.allergens.join("\n- ") +
                "\n\nProses: " +
                foods.pizza.cookingProcess
            );

        document.querySelector("#brickFoodInfo")
            .setAttribute(
                "value",
                foods.miAyam.name +
                "\n\nBahan:\n- " +
                foods.miAyam.ingredients.join("\n- ") +
                "\n\nNutrisi:\n- " +
                foods.miAyam.nutrition.join("\n- ") +
                "\n\nAlergen:\n- " +
                foods.miAyam.allergens.join("\n- ") +
                "\n\nProses: " +
                foods.miAyam.cookingProcess
            );
    </script>
</body>

</html>
