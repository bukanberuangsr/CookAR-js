<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CookAR Prototype</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>
</head>

<body style="margin: 0px; overflow: hidden">
    <a-scene embedded arjs="sourceType: webcam;">
        <!-- handle marker with your own pattern -->
        <a-marker type="pattern" url="./assets/pattern-brick.patt">
            <a-box position="0 0.5 0" material="color: red;"> </a-box>
        </a-marker>

        <a-marker preset="kanji">
            <a-entity scale="1 1 1" gltf-model="./assets/Kulkas.glb" animation-mixer></a-entity>
        </a-marker>

        <a-marker preset="hiro">

            <!-- Model -->
            <a-entity gltf-model="./assets/Plant.glb" position="0 0 0" scale="0.4 0.4 0.4">
            </a-entity>

            <!-- Background panel -->
            <a-plane position="0 1.2 0" width="2" height="1" color="#222" opacity="0.7">
            </a-plane>

            <!-- Text info -->
            <a-text id="foodInfo" position="-0.8 1.2 0.01" width="2" color="white">
            </a-text>

        </a-marker>

        <!-- add a simple camera -->
        <a-entity camera></a-entity>
    </a-scene>
    <script>
        const foods = {
            hiro: {
                name: "Nasi Goreng",
                ingredients: [
                    "Nasi",
                    "Bawang Merah",
                    "Bawang Putih",
                    "Kecap",
                    "Garam",
                    "MSG"
                ],
                model: "./assets/NasiGoreng.glb"
            }
        }
        const food = foods.hiro;

        document.querySelector("#foodInfo")
            .setAttribute(
                "value",
                food.name +
                "\n\nBahan:\n- " +
                food.ingredients.join("\n- ")
            );
    </script>
</body>

</html>
