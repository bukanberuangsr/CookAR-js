<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CookAR Prototype</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>
</head>

<body style="margin: 0px; overflow: hidden">
    <a-scene embedded arjs="sourceType: webcam;">
        <a-marker preset="hiro">
            <a-entity id="foodModel" gltf-model="./assets/models/croissant.glb" position="0.6 0.5 -1" rotation="0 180 0"
                scale="6 6 6">
            </a-entity>

            <a-plane position="0 0.0 0" rotation="-90 0 0" width="2.8" height="4" color="#FFE8F0" opacity="0.7"
                material="side: double">
            </a-plane>

            <a-text id="hiroFoodTitle" position="-1.25 0.12 -1.75" rotation="-90 0 0" width="2.5" color="#000"
                align="left" baseline="top" side="double" wrap-count="15">
            </a-text>

            <a-text id="hiroFoodInfo" position="-1.25 0.12 -1.35" rotation="-90 0 0" width="2.5" color="#000"
                align="left" baseline="top" side="double" wrap-count="28">
            </a-text>

            <a-text id="hiroFoodAllergens" position="-1.25 0.12 1.35" rotation="-90 0 0" width="2.5" color="#d00000"
                align="left" baseline="top" side="double" wrap-count="28">
            </a-text>
        </a-marker>

        <a-marker preset="kanji">
            <a-entity gltf-model="./assets/models/pizza.glb" position="0.6 0.5 -1" rotation="0 180 0" scale="2 2 2">
            </a-entity>

            <a-plane position="0 0.0 0" rotation="-90 0 0" width="2.8" height="4.5" color="#FFE8F0" opacity="0.7"
                material="side: double">
            </a-plane>

            <a-text id="kanjiFoodTitle" position="-1.25 0.12 -1.75" rotation="-90 0 0" width="2.5" color="#000"
                align="left" baseline="top" side="double" wrap-count="15">
            </a-text>

            <a-text id="kanjiFoodInfo" position="-1.25 0.12 -1.35" rotation="-90 0 0" width="2.5" color="#000"
                align="left" baseline="top" side="double" wrap-count="28">
            </a-text>

            <a-text id="kanjiFoodAllergens" position="-1.25 0.12 1.35" rotation="-90 0 0" width="2.5" color="#d00000"
                align="left" baseline="top" side="double" wrap-count="28">
            </a-text>
        </a-marker>

        <a-marker type="pattern" url="./assets/pattern-march7th.patt">
            <a-entity gltf-model="./assets/models/nasi_lemak.glb" position="1.95 0.25 -1.25" rotation="0 180 0"
                scale="1.2 1.2 1.2">
            </a-entity>

            <a-plane position="0 0.0 0" rotation="-90 0 0" width="2.8" height="5" color="#FFE8F0" opacity="0.7"
                material="side: double">
            </a-plane>

            <a-text id="march7thFoodTitle" position="-1.25 0.1 -1.75" rotation="-90 0 0" width="2.5" color="#000"
                align="left" baseline="top" side="double" wrap-count="15">
            </a-text>

            <a-text id="march7thFoodInfo" position="-1.25 0.12 -1.35" rotation="-90 0 0" width="2.5" color="#000"
                align="left" baseline="top" side="double" wrap-count="28">
            </a-text>

            <a-text id="march7thFoodAllergens" position="-1.25 0.12 2.0" rotation="-90 0 0" width="2.5" color="#d00000"
                align="left" baseline="top" side="double" wrap-count="28">
            </a-text>
        </a-marker>

        <a-marker type="pattern" url="./assets/pattern-brick.patt">
            <a-entity gltf-model="./assets/models/mi_ayam.glb" position="0.85 0.15 -0.75" rotation="0 180 0"
                scale="0.6 0.6 0.6">
            </a-entity>

            <a-plane position="0 0.0 0" rotation="-90 0 0" width="2.8" height="4" color="#FFE8F0" opacity="0.7"
                material="side: double">
            </a-plane>

            <a-text id="brickFoodTitle" position="-1.25 0.12 -1.75" rotation="-90 0 0" width="2.5" color="#000"
                align="left" baseline="top" side="double" wrap-count="15">
            </a-text>

            <a-text id="brickFoodInfo" position="-1.25 0.12 -1.35" rotation="-90 0 0" width="2.5" color="#000"
                align="left" baseline="top" side="double" wrap-count="28">
            </a-text>

            <a-text id="brickFoodAllergens" position="-1.25 0.12 1.25" rotation="-90 0 0" width="2.5" color="#d00000"
                align="left" baseline="top" side="double" wrap-count="28">
            </a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
    <script src="./scripts/foods.js"></script>
    <script>
        const foodModel = document.querySelector("#foodModel");
        const croissant = foods.croissant;

        foodModel.addEventListener("model-loaded", () => {
            console.log("Model loaded:", croissant.model);
        });

        foodModel.addEventListener("model-error", (event) => {
            console.error("Model failed to load:", croissant.model, event.detail);
        });

        function renderFoodInfo(prefix, food) {
            document.querySelector(`#${prefix}FoodTitle`)
                .setAttribute("value", food.name);

            document.querySelector(`#${prefix}FoodInfo`)
                .setAttribute(
                    "value",
                    "Bahan:\n- " +
                    food.ingredients.join("\n- ") +
                    "\n\nNutrisi:\n- " +
                    food.nutrition.join("\n- ") +
                    "\n\nProses: " +
                    food.cookingProcess
                );

            document.querySelector(`#${prefix}FoodAllergens`)
                .setAttribute(
                    "value",
                    "Alergen:\n- " +
                    food.allergens.join("\n- ")
                );
        }

        renderFoodInfo("hiro", foods.croissant);
        renderFoodInfo("kanji", foods.pizza);
        renderFoodInfo("brick", foods.miAyam);
        renderFoodInfo("march7th", foods.nasiLemak);
    </script>
</body>

</html>
